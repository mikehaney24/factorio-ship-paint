<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factorio Ship Paint</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <header>
                <h1>Factorio Ship Paint</h1>
                <p>Design your space platform foundation and export it directly to the game.</p>
                <div class="instructions">
                    <p style="font-size: 0.9rem; margin-top: 0.5rem; opacity: 0.8;">Left-click to draw, Right-click to erase. Middle-click to pan.</p>
                </div>
            </header>
            
            <div class="toolbar">
                <div class="tool-group">
                    <label>Grid Size:</label>
                    <div class="input-row">
                        <input type="number" id="gridWidth" value="50" min="10" max="300" title="Width">
                        <span>×</span>
                        <input type="number" id="gridHeight" value="50" min="10" max="300" title="Height">
                    </div>
                </div>
                
                <div class="tool-group mobile-only" id="drawModeToggle" style="display: none;">
                    <label>Action:</label>
                    <div class="input-row">
                        <button id="drawBtn" class="btn-tool active" style="flex: 1;">Draw</button>
                        <button id="eraseBtn" class="btn-tool" style="flex: 1;">Erase</button>
                        <button id="panBtn" class="btn-tool" style="flex: 1;">Pan</button>
                    </div>
                </div>
                
                <div class="tool-group">
                    <label>History:</label>
                    <div class="input-row">
                        <button id="undoBtn" class="btn-tool" disabled title="Undo (Ctrl/Cmd+Z)">↶ Undo</button>
                        <button id="redoBtn" class="btn-tool" disabled title="Redo (Ctrl/Cmd+Y or Shift+Ctrl/Cmd+Z)">↷ Redo</button>
                    </div>
                </div>
                
                <div class="tool-group">
                    <label>Brush Shape:</label>
                    <select id="brushShape" class="dropdown" style="width: 100%;">
                        <option value="circle">Circle</option>
                        <option value="square">Square</option>
                        <option value="diamond">Diamond</option>
                        <option value="rectangle">Rectangle</option>
                        <option value="triangle">Triangle</option>
                        <option value="half-circle">Half Circle</option>
                    </select>
                </div>

                <div class="tool-group">
                    <label>Brush Rotation:</label>
                    <div class="input-row">
                        <input type="range" id="brushRotation" min="0" max="360" value="0" title="Brush Rotation" style="flex-grow: 1;">
                        <input type="number" id="brushRotationNumber" min="0" max="360" value="0" title="Brush Rotation Number" style="width: 70px;">
                    </div>
                </div>

                <div class="tool-group">
                    <label>Brush Size:</label>
                    <div class="input-row">
                        <input type="range" id="brushSize" min="1" max="300" value="1" title="Brush Size" style="flex-grow: 1;">
                        <input type="number" id="brushSizeNumber" min="1" max="300" value="1" title="Brush Size Number" style="width: 70px;">
                    </div>
                </div>
                
                <div class="tool-group">
                    <label>Background Image URL:</label>
                    <div class="input-row" style="margin-bottom: 0.5rem;">
                        <input type="url" id="bgImageUrl" placeholder="https://..." style="flex-grow: 1; padding: 4px; box-sizing: border-box; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 4px;">
                        <button id="clearBgBtn" class="btn-tool" style="padding: 4px 8px; margin-left: 4px;">Clear</button>
                    </div>
                    
                    <div id="bgControls" style="display: none;">
                        <label>Image Scale:</label>
                        <div class="input-row">
                            <input type="range" id="bgScale" min="0.1" max="10" step="0.1" value="1" title="Image Scale" style="flex-grow: 1;">
                            <input type="number" id="bgScaleNumber" min="0.1" max="10" step="0.1" value="1" title="Image Scale Number" style="width: 70px;">
                        </div>
                        
                        <label style="margin-top: 0.5rem;">Image Rotation:</label>
                        <div class="input-row">
                            <input type="range" id="bgRotation" min="0" max="360" step="1" value="0" title="Image Rotation" style="flex-grow: 1;">
                            <input type="number" id="bgRotationNumber" min="0" max="360" step="1" value="0" title="Image Rotation Number" style="width: 70px;">
                        </div>

                        <label style="margin-top: 0.5rem;">Image Opacity:</label>
                        <input type="range" id="bgOpacity" min="0" max="1" step="0.05" value="0.5" title="Image Opacity" style="width: 100%; margin-bottom: 0.5rem;">
                    </div>
                </div>

                <div class="tool-group" style="margin-top: 1rem;">
                    <label>Belts Around Edge:</label>
                    <select id="numBelts" class="dropdown" style="width: 100%; margin-bottom: 0.5rem;">
                        <option value="0">0</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                    </select>
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; margin-bottom: 0.5rem;">
                        <input type="checkbox" id="addWallsCheckbox" checked>
                        Add walls to exposed edges
                    </label>
                    <button id="exportBtn" class="btn-primary" style="width: 100%; justify-content: center;">Export Blueprint</button>
                    <button id="shareBtn" class="btn-primary" style="width: 100%; justify-content: center; background-color: rgba(255, 255, 255, 0.1); border-color: transparent; margin-top: 0.5rem;">Copy Share Link</button>
                    <button id="clearBtn" class="btn-danger" style="width: 100%; justify-content: center; margin-top: 0.5rem;">Clear All</button>
                </div>
                
                <div class="tool-group" style="margin-top: auto; align-items: center; border: none; padding: 0;">
                    <script type="text/javascript" src="https://cdnjs.buymeacoffee.com/1.0.0/button.prod.min.js" data-name="bmc-button" data-slug="mikehaney24" data-color="#5F7FFF" data-emoji="" data-font="Cookie" data-text="Buy me a beverage" data-outline-color="#000000" data-font-color="#ffffff" data-coffee-color="#FFDD00" ></script>
                </div>
            </div>
        </aside>
        
        <main class="canvas-area">
            <div class="canvas-wrapper">
                <canvas id="gridCanvas"></canvas>
            </div>
        </main>
    </div>
    
    <!-- pako for zlib compression -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
