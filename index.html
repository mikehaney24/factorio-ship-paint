<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factorio Ship Paint</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <header>
                <h1>Factorio Ship Paint</h1>
                <p>Design your space platform foundation and export it directly to the game.</p>
                <p style="font-size: 0.9rem; margin-top: 0.5rem; opacity: 0.8;">
                    <strong>Controls:</strong> Left-click to draw, Right-click to erase.
                </p>
            </header>
            
            <div class="toolbar">
                <div class="tool-group">
                    <label>Grid Size:</label>
                    <div class="input-row">
                        <input type="number" id="gridWidth" value="50" min="10" max="300" title="Width">
                        <span>×</span>
                        <input type="number" id="gridHeight" value="50" min="10" max="300" title="Height">
                    </div>
                </div>
                
                <div class="tool-group mobile-only" id="drawModeToggle" style="display: none;">
                    <label>Action:</label>
                    <div class="input-row">
                        <button id="drawBtn" class="btn-tool active" style="flex: 1;">Draw</button>
                        <button id="eraseBtn" class="btn-tool" style="flex: 1;">Erase</button>
                        <button id="panBtn" class="btn-tool" style="flex: 1;">Pan</button>
                    </div>
                </div>
                
                <div class="tool-group">
                    <label>History:</label>
                    <div class="input-row">
                        <button id="undoBtn" class="btn-tool" disabled title="Undo (Ctrl/Cmd+Z)">↶ Undo</button>
                        <button id="redoBtn" class="btn-tool" disabled title="Redo (Ctrl/Cmd+Y or Shift+Ctrl/Cmd+Z)">↷ Redo</button>
                    </div>
                </div>
                
                <div class="tool-group">
                    <label>Brush Shape:</label>
                    <select id="brushShape" class="dropdown" style="width: 100%;">
                        <option value="circle">Circle</option>
                        <option value="square">Square</option>
                        <option value="diamond">Diamond</option>
                    </select>
                </div>

                <div class="tool-group">
                    <label>Brush Size:</label>
                    <div class="input-row">
                        <input type="range" id="brushSize" min="1" max="300" value="1" title="Brush Size" style="flex-grow: 1;">
                        <input type="number" id="brushSizeNumber" min="1" max="300" value="1" title="Brush Size Number" style="width: 70px;">
                    </div>
                </div>
                
                <div class="tool-group" style="margin-top: 1rem;">
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; margin-bottom: 0.5rem;">
                        <input type="checkbox" id="addWallsCheckbox" checked>
                        Add walls to exposed edges
                    </label>
                    <button id="exportBtn" class="btn-primary" style="width: 100%; justify-content: center;">Export Blueprint</button>
                    <button id="shareBtn" class="btn-primary" style="width: 100%; justify-content: center; background-color: rgba(255, 255, 255, 0.1); border-color: transparent; margin-top: 0.5rem;">Copy Share Link</button>
                    <button id="clearBtn" class="btn-danger" style="width: 100%; justify-content: center; margin-top: 0.5rem;">Clear All</button>
                </div>
                
                <div class="tool-group" style="margin-top: auto; align-items: center; border: none; padding: 0;">
                    <script type="text/javascript" src="https://cdnjs.buymeacoffee.com/1.0.0/button.prod.min.js" data-name="bmc-button" data-slug="mikehaney24" data-color="#5F7FFF" data-emoji="" data-font="Cookie" data-text="Buy me a beverage" data-outline-color="#000000" data-font-color="#ffffff" data-coffee-color="#FFDD00" ></script>
                </div>
            </div>
        </aside>
        
        <main class="canvas-area">
            <div class="canvas-wrapper">
                <canvas id="gridCanvas"></canvas>
            </div>
        </main>
    </div>
    
    <!-- pako for zlib compression -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
